provider: AIG
providerId: aig
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Insurance
  - Financial Services
  - Property Casualty
  - Rate Limiting
description: AIG does not publish public API rate-limit documentation. API integrations with AIG are
  bilateral, governed by broker / distribution agreements, and any throttling thresholds are set
  contractually rather than as a published policy.
notes: No public rate-limit documentation; placeholders pending direct vendor confirmation.
sources:
  - https://www.aig.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Contractual integration limits
    scope: contract
    metric: varies
    limit: defined per broker / distribution agreement
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on throttling responses,
      honoring Retry-After when present.
  - name: Contractual Limits
    description: Throughput and concurrency are negotiated as part of the broker / integration
      agreement; raise via the AIG technology relationship contact.
