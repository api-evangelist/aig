description: American International Group, Inc. (AIG) is a global insurance organization founded in 1919 and operating in over 200 countries and jurisdictions. AIG provides comprehensive risk 
  solutions including property casualty, cyber, professional liability, casualty, specialty insurance, and reinsurance services for individuals and businesses. AIG operates digital portals for brokers
  and clients including myAIG for North America brokers and IntelliRisk Advanced for claims management, but does not currently offer a public developer API.
