specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: AIG
providerId: aig
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: American International Group, Inc.
serviceCategory: Insurance
tags:
  - Insurance
  - Financial Services
  - Property Casualty
  - Cyber Insurance
  - FinOps
  - FOCUS
description: FOCUS-aligned shape for AIG. The cost surface is insurance premium and broker commission,
  not API consumption. APIs are integration plumbing under broker / distribution agreements.
notes: No API rate card; meters reflect the insurance-program economics customers actually book against
  AIG (premium, taxes, fees) rather than per-call API costs.
sources:
  - https://www.aig.com/
billingModel:
  pricingCategory: Insurance Premium
  billingFrequency: Annual
  billingCurrency: USD/EUR/GBP
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: AIG Insurance Programs
  ServiceCategory: Insurance
  ProviderName: AIG
  PublisherName: American International Group, Inc.
  InvoiceIssuerName: American International Group, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: insurance_premium
    description: Premium paid per policy / line of business
    unit: USD
    aggregation: sum
    dimensions:
      - line_of_business
      - policy
      - territory
      - effective_year
  - name: policy_count
    description: Number of in-force policies with AIG
    unit: policy
    aggregation: count
    dimensions:
      - line_of_business
      - territory
  - name: api_requests
    description: API requests against AIG broker / distribution endpoints (customer-side telemetry only)
    unit: request
    aggregation: sum
    dimensions:
      - integration
      - environment
principles:
  - name: Visibility
    description: Track AIG spend at the policy / line-of-business level using the broker statement and
      AIG-issued invoices; instrument API integrations client-side since AIG does not expose unified
      usage telemetry.
  - name: Allocation
    description: Allocate premium by business unit, geography, and line of business; tie technology
      integration costs to the program they serve.
  - name: Optimization
    description: Optimize through coverage-program design (deductibles, retentions, captives), broker
      negotiation, and consolidating integrations across AIG lines to reduce duplicated technology effort.
  - name: Accountability
    description: Risk management / corporate insurance leadership owns AIG spend; align reviews with
      the policy-renewal cycle.
maintainers:
