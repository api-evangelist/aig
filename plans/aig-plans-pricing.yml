description: AIG (American International Group) is a global commercial insurance carrier. It does not
  publish a public API rate card; broker, agent, and client-systems integrations are arranged through
  AIG's broker portals, distribution agreements, and dedicated technology relationships. Premium
  pricing for the underlying insurance products is quoted per risk by AIG underwriters.
notes: No public API pricing. AIG's pricing is on insurance premiums, not API consumption; API access
  is contractual.
sources:
  - https://www.aig.com/
plans:
  - id: aig-broker-distribution
    name: Broker / Distribution Agreement
    type: enterprise
    description: API and data-feed access for appointed brokers, agents, and large clients. Provisioning,
      throughput, and any technology fees are governed by AIG's distribution and integration agreements.
    entries:
      - label: Distribution agreement
        name: distribution_agreement
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact AIG
        userMultiplied: false
    elements:
      - name: Broker / agent appointment required
      - name: Submission, quote, and policy-admin integrations
      - name: Pricing on insurance premium, not API calls
